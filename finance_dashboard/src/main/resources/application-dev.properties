# Development Environment Configuration
spring.application.name=finance_dashboard

# Development Database Configuration
spring.datasource.url=jdbc:postgresql://localhost:5432/expenses_dev
spring.datasource.username=postgres
spring.datasource.password=postgres
spring.datasource.driver-class-name=org.postgresql.Driver

# Development JWT Secret (weak for faster debugging)
jwt.secret=devSecretKeyForLocalDevelopmentOnly123456789DevSecretKeyForLocalDevelopmentOnly123456789

spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# Enable SQL logging for development
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=TRACE
