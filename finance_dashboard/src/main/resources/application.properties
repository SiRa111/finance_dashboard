spring.application.name=finance_dashboard

# Database Configuration - Railway provides DATABASE_URL
spring.datasource.url=${DATABASE_URL}
spring.datasource.driver-class-name=org.postgresql.Driver

# JWT Configuration - Load from environment variables with strong default secret
# Default secret is 256+ bits: uses environment variable or strong fallback
jwt.secret=${JWT_SECRET:superSecureJWTSecretKeyWith256BitsOfEntropyForHS256AlgorithmToEnsureMaximumSecurityAndCompliance}

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# Enable JPA repository configuration
spring.jpa.open-in-view=false

# Swagger/OpenAPI Configuration
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.enabled=true
springdoc.swagger-ui.operations-sorter=method
springdoc.swagger-ui.tags-sorter=alpha

# Server Configuration
server.port=${PORT:8080}
