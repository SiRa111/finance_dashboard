# Production Environment Configuration
spring.application.name=finance_dashboard

# Production Database Configuration - Load from environment variables only
spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

# Production JWT Secret - Must be set via environment variable (no default!)
jwt.secret=${JWT_SECRET}

spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false

spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# Production logging - Only errors
logging.level.root=WARN
logging.level.zovryn.finance_dashboard=INFO

# Production security settings
server.servlet.session.cookie.secure=true
server.servlet.session.cookie.http-only=true
server.servlet.session.cookie.same-site=strict
